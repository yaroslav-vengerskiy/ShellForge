name: ShellForge
options:
  bundleIdPrefix: com.shellforge
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    PRODUCT_NAME: ShellForge

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.12.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: "4.2.2"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"

targets:
  ShellForge:
    type: application
    platform: macOS
    sources:
      - ShellForge
    dependencies:
      - package: SwiftTerm
        product: SwiftTerm
      - package: KeychainAccess
        product: KeychainAccess
      - package: GRDB
        product: GRDB
    settings:
      base:
        INFOPLIST_FILE: ShellForge/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: ShellForge/Resources/ShellForge.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: ShellForge/Resources/ShellForge.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true

  ShellForgeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: ShellForge
